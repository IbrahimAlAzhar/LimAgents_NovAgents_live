<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LimGen v2 – Limitation & Novelty Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1612;--bg2:#2a2420;--text:#F0E8DE;--text2:#E8E0D6;--muted:#8B7355;--dim:#6B6155;
  --accent:#C4956A;--accent2:#A07850;--border:rgba(232,224,214,0.08);--surface:rgba(232,224,214,0.04);
  --lim:#5DCAA5;--nov:#EF9F27;--merge:#AFA9EC;--err:#E8A0A0;
}
body{min-height:100vh;background:linear-gradient(145deg,var(--bg) 0%,var(--bg2) 40%,#1e1a16 100%);color:var(--text2);font-family:'Source Serif 4',Georgia,serif;line-height:1.6}
header{border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:rgba(26,22,18,0.7);position:sticky;top:0;z-index:100}
.logo-g{display:flex;align-items:center;gap:12px}
.logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--muted));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--bg);box-shadow:0 2px 10px rgba(196,149,106,0.3)}
.logo-t{font-size:17px;font-weight:600;letter-spacing:-0.02em;color:var(--text)}
.logo-s{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.proc{display:none;align-items:center;gap:8px;padding:5px 12px;border-radius:16px;background:rgba(196,149,106,0.12);border:1px solid rgba(196,149,106,0.2)}
.proc.on{display:flex}.proc .d{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.5s ease-in-out infinite}
.proc span{font-size:11px;color:var(--accent);font-weight:500}
main{max-width:880px;margin:0 auto;padding:32px 20px 100px}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:28px;background:rgba(0,0,0,0.2);border-radius:12px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:12px 8px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Source Serif 4',Georgia,serif;transition:all .2s;color:var(--dim);background:transparent;text-align:center}
.tab.active{color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.tab[data-t="lim"].active{background:rgba(93,202,165,0.25);color:var(--lim)}
.tab[data-t="nov"].active{background:rgba(239,159,39,0.25);color:var(--nov)}
.tab[data-t="merge"].active{background:rgba(175,169,236,0.25);color:var(--merge)}
.tab .emoji{font-size:16px;margin-right:6px}

/* Panels */
.panel{display:none}.panel.active{display:block;animation:slideUp .4s ease-out}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.card label{font-size:12px;font-weight:600;display:block;margin-bottom:8px;letter-spacing:0.04em;text-transform:uppercase}
.card .hint{font-size:10px;color:var(--dim);margin-top:6px}
.inp-row{display:flex;gap:6px}
input[type=text],input[type=password]{flex:1;padding:10px 14px;border-radius:9px;background:rgba(0,0,0,0.3);border:1px solid rgba(232,224,214,0.1);color:var(--text2);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none}
input::placeholder{color:var(--dim)}
.btn-s{padding:10px 14px;border-radius:9px;background:rgba(232,224,214,0.06);border:1px solid rgba(232,224,214,0.1);color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;font-family:'Source Serif 4',Georgia,serif}
.btn-s:hover{background:rgba(232,224,214,0.1)}
.model-btns{display:flex;gap:6px;flex-wrap:wrap}
.model-btn{padding:8px 16px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:500;font-family:'JetBrains Mono',monospace;transition:all .2s;background:rgba(0,0,0,0.2);border:1px solid var(--border);color:var(--muted)}
.model-btn.active{background:rgba(196,149,106,0.2);border-color:rgba(196,149,106,0.4);color:var(--accent)}
.dropzone{border:2px dashed rgba(232,224,214,0.1);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;margin-bottom:20px;transition:all .3s;background:var(--surface)}
.dropzone.has{background:rgba(196,149,106,0.06);border-color:rgba(196,149,106,0.3)}
.dropzone:hover{border-color:rgba(232,224,214,0.2)}
.btn-p{width:100%;padding:14px;border-radius:11px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:'Source Serif 4',Georgia,serif;transition:all .3s}
.btn-p.off{background:rgba(232,224,214,0.06);color:var(--dim);cursor:not-allowed}
.btn-lim{background:linear-gradient(135deg,#5DCAA5,#1D9E75);color:var(--bg);box-shadow:0 3px 16px rgba(93,202,165,0.3)}
.btn-nov{background:linear-gradient(135deg,#EF9F27,#BA7517);color:var(--bg);box-shadow:0 3px 16px rgba(239,159,39,0.3)}
.btn-merge{background:linear-gradient(135deg,#AFA9EC,#7F77DD);color:var(--bg);box-shadow:0 3px 16px rgba(175,169,236,0.3)}
.err{background:rgba(200,80,80,0.1);border:1px solid rgba(200,80,80,0.3);border-radius:11px;padding:12px 18px;margin-bottom:16px;color:var(--err);font-size:13px}

/* Results */
.file-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:16px;background:var(--surface);border:1px solid var(--border);margin-bottom:20px;font-size:12px;color:var(--muted)}
.file-badge .tag{padding:2px 7px;border-radius:5px;background:rgba(196,149,106,0.12);font-size:10px;color:var(--accent);font-family:'JetBrains Mono',monospace}
.prog{background:rgba(232,224,214,0.06);border-radius:5px;height:3px;margin-bottom:22px;overflow:hidden}
.prog .fill{height:100%;border-radius:5px;transition:width .8s ease-out;width:0%}
.fill-lim{background:linear-gradient(90deg,#5DCAA5,#1D9E75)}
.fill-nov{background:linear-gradient(90deg,#EF9F27,#BA7517)}
.fill-merge{background:linear-gradient(90deg,#AFA9EC,#7F77DD)}
.status{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px}
.status .d{width:5px;height:5px;border-radius:50%;animation:pulse 1s ease-in-out infinite}
.agent-card{margin-bottom:10px;border-radius:12px;background:rgba(232,224,214,0.03);border:1px solid rgba(232,224,214,0.06);overflow:hidden;animation:slideUp .4s ease-out}
.agent-hdr{width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:transparent;border:none;cursor:pointer;color:var(--text2);text-align:left;font-family:'Source Serif 4',Georgia,serif}
.agent-hdr .l{display:flex;align-items:center;gap:10px}
.agent-hdr .n{font-size:13px;font-weight:600}.agent-hdr .dot{width:7px;height:7px;border-radius:50%}
.agent-hdr .arrow{font-size:11px;color:var(--dim);transition:transform .2s}
.agent-hdr .arrow.open{transform:rotate(180deg)}
.agent-body{padding:0 18px 18px;font-size:12px;color:#B8B0A6;line-height:1.7;border-top:1px solid rgba(232,224,214,0.04);display:none}
.agent-body.open{display:block;padding-top:14px}
.final{margin-top:28px;border-radius:14px;padding:24px;animation:slideUp .5s ease-out}
.final-lim{background:linear-gradient(145deg,rgba(93,202,165,0.08),rgba(93,202,165,0.03));border:1px solid rgba(93,202,165,0.2)}
.final-nov{background:linear-gradient(145deg,rgba(239,159,39,0.08),rgba(239,159,39,0.03));border:1px solid rgba(239,159,39,0.2)}
.final-merge{background:linear-gradient(145deg,rgba(175,169,236,0.08),rgba(175,169,236,0.03));border:1px solid rgba(175,169,236,0.2)}
.final .hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.final .hdr .e{font-size:20px}
.final .hdr h2{font-size:18px;font-weight:600;color:var(--text)}
.final .content{font-size:13px;color:#D4CCC2;line-height:1.75}
.actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap}
.bullet{display:flex;gap:7px;margin-bottom:5px}.bullet .bd{color:var(--muted);flex-shrink:0}
.hidden{display:none!important}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(139,115,85,0.3);border-radius:3px}
@media(max-width:600px){header{padding:12px 16px}main{padding:20px 14px 60px}.tabs{flex-direction:column}.tab{padding:10px}}
</style>
</head>
<body>

<header>
  <div class="logo-g">
    <div class="logo-icon">L</div>
    <div><div class="logo-t">LimGen v2</div><div class="logo-s">Limitation & Novelty Analysis</div></div>
  </div>
  <div id="proc" class="proc"><div class="d"></div><span>Processing</span></div>
</header>

<main>
  <!-- ══════ TABS ══════ -->
  <div class="tabs">
    <button class="tab active" data-t="lim" onclick="switchTab('lim')"><span class="emoji">🔬</span>LimAgents</button>
    <button class="tab" data-t="nov" onclick="switchTab('nov')"><span class="emoji">✨</span>NovAgents</button>
    <button class="tab" data-t="merge" onclick="switchTab('merge')"><span class="emoji">🔗</span>Merge</button>
  </div>

  <!-- ══════ SHARED CONFIG ══════ -->
  <div id="configSection">
    <div class="card">
      <label style="color:var(--accent)">OpenAI API Key</label>
      <div class="inp-row">
        <input type="password" id="apiKey" placeholder="sk-proj-...">
        <button class="btn-s" onclick="toggleVis('apiKey',this)">Show</button>
      </div>
    </div>
    <div class="card">
      <label style="color:var(--accent)">Model</label>
      <div class="model-btns" id="modelBtns">
        <button class="model-btn active" data-m="gpt-4o-mini">gpt-4o-mini</button>
        <button class="model-btn" data-m="gpt-4o">gpt-4o</button>
        <button class="model-btn" data-m="gpt-4-turbo">gpt-4-turbo</button>
      </div>
    </div>
  </div>

  <!-- ══════ LIM PANEL ══════ -->
  <div id="panel-lim" class="panel active">
    <div id="lim-input">
      <div class="dropzone" id="lim-drop" onclick="$('lim-file').click()">
        <input type="file" id="lim-file" accept=".pdf" style="display:none" onchange="handleFile('lim',event)">
        <div style="font-size:28px;margin-bottom:6px;opacity:.5">📤</div>
        <div id="lim-fname" style="font-size:14px;color:var(--muted)">Drop PDF here or click to browse</div>
      </div>
      <div id="lim-err" class="err hidden"></div>
      <button class="btn-p off" id="lim-btn" onclick="runLim()">🔬 Run LimAgents</button>
    </div>
    <div id="lim-results" class="hidden"></div>
  </div>

  <!-- ══════ NOV PANEL ══════ -->
  <div id="panel-nov" class="panel">
    <div id="nov-input">
      <div class="card">
        <label style="color:var(--nov)">Pinecone API Key</label>
        <div class="inp-row">
          <input type="password" id="pineconeKey" placeholder="pc-...">
          <button class="btn-s" onclick="toggleVis('pineconeKey',this)">Show</button>
        </div>
      </div>
      <div class="card">
        <label style="color:var(--nov)">Pinecone Index Name</label>
        <input type="text" id="indexName" placeholder="limgen-papers" style="width:100%">
      </div>
      <div class="dropzone" id="nov-drop" onclick="$('nov-file').click()">
        <input type="file" id="nov-file" accept=".pdf" style="display:none" onchange="handleFile('nov',event)">
        <div style="font-size:28px;margin-bottom:6px;opacity:.5">📤</div>
        <div id="nov-fname" style="font-size:14px;color:var(--muted)">Drop PDF here or click to browse</div>
      </div>
      <div id="nov-err" class="err hidden"></div>
      <button class="btn-p off" id="nov-btn" onclick="runNov()">✨ Run NovAgents</button>
    </div>
    <div id="nov-results" class="hidden"></div>
  </div>

  <!-- ══════ MERGE PANEL ══════ -->
  <div id="panel-merge" class="panel">
    <div id="merge-input">
      <div class="card" style="border-color:rgba(93,202,165,0.2)">
        <label style="color:var(--lim)">LimAgents Output</label>
        <div id="merge-lim-status" style="font-size:13px;color:var(--dim);margin-bottom:8px">
          ⏳ Run LimAgents first (will auto-fill)
        </div>
        <textarea id="merge-lim-text" rows="4" style="width:100%;padding:10px 14px;border-radius:9px;background:rgba(0,0,0,0.3);border:1px solid rgba(232,224,214,0.1);color:var(--text2);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;resize:vertical" placeholder="Auto-filled when LimAgents completes, or paste manually..."></textarea>
      </div>
      <div class="card" style="border-color:rgba(239,159,39,0.2)">
        <label style="color:var(--nov)">NovAgents Output</label>
        <div id="merge-nov-status" style="font-size:13px;color:var(--dim);margin-bottom:8px">
          ⏳ Run NovAgents first (will auto-fill)
        </div>
        <textarea id="merge-nov-text" rows="4" style="width:100%;padding:10px 14px;border-radius:9px;background:rgba(0,0,0,0.3);border:1px solid rgba(232,224,214,0.1);color:var(--text2);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;resize:vertical" placeholder="Auto-filled when NovAgents completes, or paste manually..."></textarea>
      </div>
      <div id="merge-err" class="err hidden"></div>
      <button class="btn-p off" id="merge-btn" onclick="runMerge()">🔗 Merge Both Outputs</button>
    </div>
    <div id="merge-results" class="hidden"></div>
  </div>
</main>

<script>
// ─── State ─────────────────────────────────────
const API_URL = '';
let model = 'gpt-4o-mini';
let files = { lim: null, nov: null };
let outputs = { lim: '', nov: '', merge: '' };

function $(id) { return document.getElementById(id); }
function toggleVis(id, btn) { const i=$(id); if(i.type==='password'){i.type='text';btn.textContent='Hide'}else{i.type='password';btn.textContent='Show'} }

// Model buttons
document.querySelectorAll('.model-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.model-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); model = b.dataset.m;
  });
});

// ─── Tab switching ─────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab[data-t="${t}"]`).classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  $(`panel-${t}`).classList.add('active');
}

// ─── File handling ─────────────────────────────
function handleFile(type, e) {
  const f = e.target.files?.[0];
  if (f && f.type === 'application/pdf') {
    files[type] = f;
    $(`${type}-drop`).classList.add('has');
    $(`${type}-fname`).textContent = f.name;
    $(`${type}-fname`).style.color = 'var(--text)';
    updateBtn(type);
  }
}

['lim','nov'].forEach(t => {
  $(`${t}-drop`).addEventListener('dragover', e => e.preventDefault());
  $(`${t}-drop`).addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files?.[0];
    if (f && f.type === 'application/pdf') {
      files[t] = f; $(`${t}-drop`).classList.add('has');
      $(`${t}-fname`).textContent = f.name; $(`${t}-fname`).style.color = 'var(--text)';
      updateBtn(t);
    }
  });
});

function updateBtn(type) {
  const key = $('apiKey').value.trim();
  if (type === 'lim') {
    const ok = key && files.lim;
    $('lim-btn').className = ok ? 'btn-p btn-lim' : 'btn-p off';
  } else if (type === 'nov') {
    const ok = key && files.nov && $('pineconeKey').value.trim() && $('indexName').value.trim();
    $('nov-btn').className = ok ? 'btn-p btn-nov' : 'btn-p off';
  } else if (type === 'merge') {
    const ok = key && $('merge-lim-text').value.trim() && $('merge-nov-text').value.trim();
    $('merge-btn').className = ok ? 'btn-p btn-merge' : 'btn-p off';
  }
}
$('apiKey').addEventListener('input', () => { updateBtn('lim'); updateBtn('nov'); updateBtn('merge'); });
$('pineconeKey').addEventListener('input', () => updateBtn('nov'));
$('indexName').addEventListener('input', () => updateBtn('nov'));
$('merge-lim-text').addEventListener('input', () => updateBtn('merge'));
$('merge-nov-text').addEventListener('input', () => updateBtn('merge'));

// ─── Rendering ─────────────────────────────────
function renderMd(text) {
  return text.split('\n').map(line => {
    const b = line.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text)">$1</strong>');
    if (line.startsWith('- ')) return `<div class="bullet"><span class="bd">•</span><span>${b.slice(2)}</span></div>`;
    if (line.startsWith('## ')) return `<h3 style="font-size:15px;font-weight:600;color:var(--text);margin:16px 0 8px">${b.slice(3)}</h3>`;
    if (/^\d+\.\s/.test(line)) return `<div class="bullet"><span class="bd">${line.match(/^\d+/)[0]}.</span><span>${b.replace(/^\d+\.\s/,'')}</span></div>`;
    if (line.trim() === '') return '<div style="height:6px"></div>';
    return `<p style="margin:3px 0">${b}</p>`;
  }).join('');
}

function addAgentCard(container, name, content, color) {
  const id = 'ac-' + name.replace(/\W/g, '_') + '-' + Date.now();
  const div = document.createElement('div');
  div.className = 'agent-card';
  div.innerHTML = `
    <button class="agent-hdr" onclick="toggleAC('${id}')">
      <div class="l"><span style="font-size:16px">🤖</span><span class="n">${name}</span><div class="dot" style="background:${color}"></div></div>
      <span class="arrow" id="${id}-arr">▼</span>
    </button>
    <div class="agent-body" id="${id}-body">${renderMd(content)}</div>`;
  container.appendChild(div);
}
function toggleAC(id) { const b=$(id+'-body'),a=$(id+'-arr'); b.classList.toggle('open'); a.classList.toggle('open'); }

// ─── SSE Runner ────────────────────────────────
async function runSSE(url, formData, type, resultContainer, fillClass, accentColor, onResult) {
  const key = $('apiKey').value.trim();
  if (!key) { showErr(type, 'Enter your OpenAI API key.'); return; }
  formData.append('api_key', key);
  formData.append('model', model);

  $(`${type}-input`).classList.add('hidden');
  $(resultContainer).classList.remove('hidden');
  $(resultContainer).innerHTML = `
    <div class="prog"><div class="fill ${fillClass}" id="${type}-fill"></div></div>
    <div class="status" id="${type}-status" style="color:${accentColor}"><div class="d" style="background:${accentColor}"></div><span id="${type}-stxt">Starting...</span></div>
    <div id="${type}-agents"></div>
    <div id="${type}-final"></div>`;
  $('proc').classList.add('on');

  let agentCount = 0;
  try {
    const resp = await fetch(API_URL + url, { method: 'POST', body: formData });
    if (!resp.ok) throw new Error(`Server error: ${resp.status}`);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.type === 'status') {
            $(`${type}-stxt`).textContent = d.message;
          } else if (d.type === 'agent') {
            agentCount++;
            $(`${type}-fill`).style.width = Math.min(agentCount * 12, 95) + '%';
            addAgentCard($(`${type}-agents`), d.agent, d.content, accentColor);
          } else if (d.type === 'result') {
            $(`${type}-fill`).style.width = '100%';
            $(`${type}-status`).classList.add('hidden');
            setTimeout(() => { const p=$(`${type}-fill`)?.parentElement; if(p) p.classList.add('hidden'); }, 800);
            onResult(d.content);
          } else if (d.type === 'error') {
            $(`${type}-final`).innerHTML = `<div class="err">${d.message}<br><button class="btn-s" style="margin-top:10px" onclick="resetPanel('${type}')">Try Again</button></div>`;
          }
        } catch {}
      }
    }
  } catch (e) {
    $(`${type}-final`).innerHTML = `<div class="err">${e.message}<br><button class="btn-s" style="margin-top:10px" onclick="resetPanel('${type}')">Try Again</button></div>`;
  }
  $('proc').classList.remove('on');
}

function showFinal(container, content, cssClass, emoji, title, type) {
  $(container).innerHTML = `
    <div class="final ${cssClass}">
      <div class="hdr"><span class="e">${emoji}</span><h2>${title}</h2></div>
      <div class="content">${renderMd(content)}</div>
      <div class="actions">
        <button class="btn-s" onclick="navigator.clipboard.writeText(outputs['${type}'])">📋 Copy</button>
        <button class="btn-s" onclick="resetPanel('${type}')">🔄 Run Again</button>
      </div>
    </div>`;
}

function showErr(type, msg) {
  $(`${type}-err`).textContent = msg;
  $(`${type}-err`).classList.remove('hidden');
}

function resetPanel(type) {
  $(`${type}-input`).classList.remove('hidden');
  $(`${type}-results`).classList.add('hidden');
  $(`${type}-results`).innerHTML = '';
  const errEl = $(`${type}-err`);
  if (errEl) errEl.classList.add('hidden');
}

// ─── Pipeline Runners ──────────────────────────
function runLim() {
  if (!$('apiKey').value.trim() || !files.lim) { showErr('lim','Enter API key and upload PDF.'); return; }
  const fd = new FormData(); fd.append('file', files.lim);
  runSSE('/api/lim-agents', fd, 'lim', 'lim-results', 'fill-lim', '#5DCAA5', content => {
    outputs.lim = content;
    showFinal('lim-final', content, 'final-lim', '🔬', 'Limitation Analysis Complete', 'lim');
    $('merge-lim-text').value = content;
    $('merge-lim-status').innerHTML = '✅ Auto-filled from LimAgents';
    $('merge-lim-status').style.color = 'var(--lim)';
    updateBtn('merge');
  });
}

function runNov() {
  const key=$('apiKey').value.trim(), pk=$('pineconeKey').value.trim(), idx=$('indexName').value.trim();
  if (!key||!pk||!idx||!files.nov) { showErr('nov','Fill in all fields and upload PDF.'); return; }
  const fd = new FormData();
  fd.append('file', files.nov);
  fd.append('pinecone_key', pk);
  fd.append('index_name', idx);
  runSSE('/api/nov-agents', fd, 'nov', 'nov-results', 'fill-nov', '#EF9F27', content => {
    outputs.nov = content;
    showFinal('nov-final', content, 'final-nov', '✨', 'Novelty Analysis Complete', 'nov');
    $('merge-nov-text').value = content;
    $('merge-nov-status').innerHTML = '✅ Auto-filled from NovAgents';
    $('merge-nov-status').style.color = 'var(--nov)';
    updateBtn('merge');
  });
}

function runMerge() {
  const key=$('apiKey').value.trim();
  const limText=$('merge-lim-text').value.trim(), novText=$('merge-nov-text').value.trim();
  if (!key||!limText||!novText) { showErr('merge','Need API key and both outputs.'); return; }
  const fd = new FormData();
  fd.append('lim_output', limText);
  fd.append('nov_output', novText);
  runSSE('/api/merge', fd, 'merge', 'merge-results', 'fill-merge', '#AFA9EC', content => {
    outputs.merge = content;
    showFinal('merge-final', content, 'final-merge', '🔗', 'Merged Limitations Report', 'merge');
  });
}
</script>
</body>
</html>
